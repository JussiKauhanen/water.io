<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>water.io</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/lz-string.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div class="stage">
  <svg class="phone" viewBox="0 0 400 812" aria-hidden="true">
    <rect x="4" y="4" width="392" height="804" rx="54" fill="#1b1f24"/>
    <rect x="14" y="14" width="372" height="784" rx="46" fill="#fff"/>
    <rect x="160" y="24" width="80" height="18" rx="9" fill="#1b1f24"/>
    <rect x="150" y="782" width="100" height="5" rx="2.5" fill="#1b1f24" opacity=".35"/>
  </svg>

  <main class="screen">
    <header class="top">
      <h1>water<span>.io</span></h1>
      <div class="top-actions">
        <button class="sync-pill" id="syncPill" style="display:none"></button>
        <button class="icon share-btn" id="btnShare" title="Share" style="display:none">
<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle>
                <path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"></path>
              </svg>
        </button>
        <button class="avatar" id="btnMe" title="Your name"></button>
      </div>
    </header>

    <div class="feed" id="feed"></div>

    <!-- ============ THREAD VIEW ============ -->
    <div class="thread-view" id="threadView" hidden>
      <header class="thread-top">
        <button class="thread-back" id="threadBack" aria-label="Back">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 5l-7 7 7 7"/>
          </svg>
        </button>
        <button class="avatar sm" id="threadAv" style="cursor:default"></button>
        <div class="thread-info">
          <span class="thread-title" id="threadTitle"></span>
          <span class="thread-sub" id="threadSub"></span>
        </div>
      </header>
      <div class="thread-body" id="threadBody"></div>
      <form class="thread-composer" id="threadComposer">
        <div class="cm-input-wrap" style="flex:1">
          <input id="threadInput" maxlength="50" placeholder="Reply…" autocomplete="off">
          <span class="cm-counter" id="threadCount">0/50</span>
        </div>
        <button type="submit" class="send" aria-label="Send reply">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M2 20.5c2.6.7 4.6-.3 4.6-1.9 0-1-1.2-1.5-1.9-.8-.8.8-.1 2.3 1.5 2.9 1.6.6 3.4.2 4.6-.9"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M21.4 2.6 9.9 13.2m11.5-10.6-6.6 18.2-3.6-7.6-7.6-3.6 17.8-7z"
                  stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" fill="currentColor" fill-opacity=".15"/>
          </svg>
        </button>
      </form>
    </div>

    <button class="fab" id="btnNew" aria-label="New spot">+</button>

    <!-- Map Picker Overlay — inside .screen so it's clipped by the phone frame on desktop -->
    <div class="map-overlay" id="mapSheet" hidden>
      <div class="map-topbar">
        <button class="map-close-btn" id="mapClose" aria-label="Close">
          <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
            <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="map-title">Pick location</span>
        <div class="map-style-btns">
          <button class="map-style-btn active" data-style="voyager" title="Voyager">
            <svg viewBox="0 0 16 16" fill="none" width="15" height="15">
              <path d="M1 3.5l4-1.5 5 2 5-2v9l-5 2-5-2-4 1.5V3.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              <line x1="5" y1="2" x2="5" y2="13" stroke="currentColor" stroke-width="1.3"/>
              <line x1="10" y1="4" x2="10" y2="15" stroke="currentColor" stroke-width="1.3"/>
            </svg>
          </button>
          <button class="map-style-btn" data-style="light" title="Light">
            <svg viewBox="0 0 16 16" fill="none" width="15" height="15">
              <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3"/>
              <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.2 3.2l1.1 1.1M11.7 11.7l1.1 1.1M3.2 12.8l1.1-1.1M11.7 4.3l1.1-1.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="map-style-btn" data-style="dark" title="Dark">
            <svg viewBox="0 0 16 16" fill="none" width="15" height="15">
              <path d="M13.5 9.5a6 6 0 11-7-7 5 5 0 007 7z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="mapContainer"></div>
      <div class="map-bottombar">
        <div class="map-place-preview" id="mapPlacePreview" hidden>
          <span class="map-place-icon">📍</span>
          <span id="mapPlaceName"></span>
        </div>
        <button class="primary map-confirm-btn" id="mapConfirm" disabled>Confirm location</button>
      </div>
    </div>
  </main>
</div>

<!-- Share Modal - Bottom Sheet -->
<div class="sheet-wrap bottom-sheet" id="shareModal" hidden>
  <div class="sheet share-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h2>Share</h2>
      <button class="x" id="shareClose" aria-label="Close">×</button>
    </div>
    
    <div class="share-preview">
      <div class="share-stats">
        <span class="share-count" id="shareCount">0 spots</span>
        <span class="share-time" id="shareTime">Last updated just now</span>
      </div>
      <div class="share-url-container">
        <input type="text" id="shareUrl" readonly onclick="this.select()">
        <button class="copy-btn" id="shareCopy" title="Copy link">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="share-divider"></div>

    <div class="share-options">
      <button class="share-option" data-share="copy">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <span>Copy</span>
      </button>
      <button class="share-option" data-share="whatsapp">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="#25D366">
          <path d="M12.032 21.965c-1.92 0-3.78-.54-5.34-1.56l-4.29 1.36 1.37-4.22c-1.08-1.62-1.66-3.52-1.66-5.5 0-5.52 4.48-10 10-10s10 4.48 10 10-4.48 10-10 10zm0-18.96c-4.96 0-8.99 4.03-8.99 8.99 0 1.74.52 3.44 1.48 4.88l-.98 3.03 3.13-.99c1.4.84 3.02 1.31 4.73 1.31 4.96 0 8.99-4.03 8.99-8.99s-4.04-8.99-9-8.99zm5.48 7.23c-.3-.15-1.78-.88-2.06-.98-.28-.1-.49-.15-.7.15s-.81.98-.99 1.18c-.18.2-.36.22-.66.07-.3-.15-1.27-.47-2.42-1.49-.89-.8-1.5-1.78-1.67-2.08-.18-.3-.02-.46.13-.61.14-.14.3-.36.45-.54.15-.18.2-.3.3-.5.1-.2.05-.38-.03-.52-.08-.14-.7-1.68-.96-2.3-.25-.6-.51-.52-.7-.53-.18-.01-.38-.01-.58-.01-.2 0-.52.08-.8.38-.28.3-1.07 1.04-1.07 2.54 0 1.5 1.09 2.95 1.24 3.15.15.2 2.14 3.27 5.18 4.59.72.31 1.29.5 1.73.64.73.24 1.39.2 1.91.12.58-.09 1.78-.73 2.03-1.43.25-.7.25-1.3.17-1.43-.08-.13-.28-.21-.58-.36z"/>
        </svg>
        <span>WhatsApp</span>
      </button>
      <button class="share-option" data-share="facebook">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="#1877f2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        <span>Facebook</span>
      </button>
      <button class="share-option" data-share="instagram">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="url(#instaGrad)">
          <defs>
            <linearGradient id="instaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f58529"/>
              <stop offset="30%" stop-color="#dd2a7b"/>
              <stop offset="60%" stop-color="#8134af"/>
              <stop offset="100%" stop-color="#515bd4"/>
            </linearGradient>
          </defs>
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
        </svg>
        <span>Instagram</span>
      </button>
    </div>

  </div>
</div>

<!-- Reaction Detail Bottom Sheet -->
<div class="sheet-wrap bottom-sheet" id="reactionSheet" hidden>
  <div class="sheet reaction-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h2 id="reactionTitle">🌊 3 people</h2>
      <button class="x" id="reactionClose">×</button>
    </div>
    <div class="reaction-users" id="reactionUsers"></div>
    <div class="reaction-actions">
      <div class="reaction-emoji-picker" id="reactionPicker"></div>
    </div>
  </div>
</div>


<!-- username -->
<div class="sheet-wrap" id="nameSheet" hidden>
  <div class="sheet">
    <h2>Pick a username</h2>
    <p class="hint">Shown on your posts. Change it any time from your avatar.</p>
    <input id="nameInput" maxlength="20" placeholder="e.g. Jussi" autocomplete="off">
    <div class="row end">
      <button class="ghost" id="nameCancel">Cancel</button>
      <button class="primary" id="nameSave">Save</button>
    </div>
    <div class="name-footer">
      <span class="app-version" id="appVersion"></span>
      <div id="clearDataWrap">
        <button class="ghost-danger" id="clearDataBtn">Clear all data</button>
      </div>
    </div>
  </div>
</div>

<!-- new post -->
<div class="sheet-wrap bottom-sheet" id="postSheet" hidden>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h2>New spot</h2>
      <button class="x" id="postCancel" aria-label="Close">×</button>
    </div>

    <div class="post-field" id="namePicker" hidden>
      <span class="post-icon">
        <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
          <circle cx="10" cy="6.5" r="3.25" stroke="currentColor" stroke-width="1.5"/>
          <path d="M3.5 17c0-3.3 2.9-5.5 6.5-5.5s6.5 2.2 6.5 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <div class="field">
        <input id="pName" maxlength="20" placeholder="Your name — shown on the post" autocomplete="off">
      </div>
    </div>

    <div class="post-field">
      <span class="post-icon">
        <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
          <rect x="3" y="2" width="14" height="16" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6.5 7.5h7M6.5 11h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <div class="field">
        <textarea id="pDesc" maxlength="50" rows="2" placeholder="Describe the spot in a few words"></textarea>
        <div class="count" id="descCount">0/50</div>
      </div>
    </div>

    <div class="post-field" id="locationPicker">
      <span class="post-icon">
        <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
          <path d="M10 1.5A5.5 5.5 0 004.5 7C4.5 11 10 18.5 10 18.5S15.5 11 15.5 7A5.5 5.5 0 0010 1.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="10" cy="7" r="2" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </span>
      <div class="post-loc-wrap">
        <input id="pPlace" maxlength="80" placeholder="e.g. Kaitalampi, Espoo">
        <button type="button" id="geoDetect" class="geo-btn" title="Detect my location">
          <!-- Compass: red north needle, grey south, circle -->
          <svg viewBox="0 0 20 20" width="30" height="30" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="8.5" fill="none" stroke="#8b939d" stroke-width="1.5"/>
            <polygon points="10,2.5 13,10 7,10" fill="#e63946"/>
            <polygon points="10,17.5 13,10 7,10" fill="#8b939d" opacity="0.45"/>
            <circle cx="10" cy="10" r="2.2" fill="#ffffff" stroke="#8b939d" stroke-width="1.2"/>
          </svg>
        </button>
        <button type="button" id="mapPick" class="geo-btn" title="Pick on map">
          <!-- Simplified maps icon: green map + yellow road + red pin, no G -->
          <svg viewBox="0 0 16 16" fill="none" width="35" height="35" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="5.5" width="10.5" height="9.5" rx="1.5" fill="#4CAF50"/>
            <path d="M1 12.5L11.5 6v2.5L1 15z" fill="#FFC107"/>
            <path d="M11.5 0C9.57 0 8 1.57 8 3.5 8 6.08 11.5 10 11.5 10S15 6.08 15 3.5C15 1.57 13.43 0 11.5 0z" fill="#e63946"/>
            <circle cx="11.5" cy="3.5" r="1.3" fill="#b71c1c"/>
          </svg>
        </button>
      </div>
    </div>

    <label class="photo-add" id="dropLabel">
      <input type="file" id="pImg" accept="image/*" hidden>
      <span class="photo-cta" id="dropCta">
        <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
          <rect x="2.5" y="4.5" width="15" height="11" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="10" cy="10" r="2.75" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        Add photo
        <em>optional</em>
      </span>
      <span class="photo-chosen" id="photoChosen" hidden>
        <img class="preview" id="pPrev" alt="">
        <span class="photo-chosen-label">Photo attached</span>
        <button type="button" class="photo-remove" id="photoRemove" aria-label="Remove photo">×</button>
      </span>
    </label>

    <div class="geobar ok" id="geoBar" hidden>
      <span class="dot"></span>
      <span id="geoText"></span>
      <button class="link" id="geoChange">change</button>
    </div>

    <button class="primary block" id="postSave" disabled>Post spot</button>
  </div>
</div>

<!-- Sync Sheet -->
<div class="sheet-wrap bottom-sheet" id="syncSheet" hidden>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h2>Sync history</h2>
      <button class="x" id="syncClose" aria-label="Close">×</button>
    </div>
    <div class="sync-graph" id="syncGraph"></div>
  </div>
</div>


<input type="file" id="fileImport" accept="application/json" hidden>
<script src="app.js"></script>
</body>
</html>
